name: Pages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy PWA to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Nur das Frontend (src/) veröffentlichen
        uses: actions/upload-pages-artifact@v3
        with:
          path: src
      - id: deployment
        uses: actions/deploy-pages@v4
