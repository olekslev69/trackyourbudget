<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sparblick</title>
  <meta name="description" content="Lokaler Vertrags- und Budget-Tracker: Einnahmen, Zahlungen, Sparraten und Fälligkeiten im Blick." />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sparblick" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Sparblick</span>
    </div>
    <div class="header-controls">
      <label class="view-filter">
        <span>Ansicht</span>
        <select id="personFilter" aria-label="Nach Person filtern"></select>
      </label>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab is-active" data-view="uebersicht" role="tab">Übersicht</button>
    <button class="tab" data-view="einnahmen" role="tab">Einnahmen</button>
    <button class="tab" data-view="zahlungen" role="tab">Ausgaben</button>
    <button class="tab" data-view="sparen" role="tab">Sparen</button>
    <button class="tab" data-view="kategorien" role="tab">Kategorien</button>
    <button class="tab" data-view="personen" role="tab">Personen</button>
    <button class="tab" data-view="daten" role="tab">Daten</button>
  </nav>

  <main id="app" class="app-main"></main>

  <div id="modalRoot"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
